<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Vault App</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b141a; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .app-card { background: #1f2c34; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center; box-sizing: border-box; }
        h2 { margin: 0 0 8px 0; color: #00a884; }
        p { color: #8696a0; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; background: #2a3942; border: 1px solid #3b4a54; padding: 14px; border-radius: 8px; color: white; font-size: 16px; margin-bottom: 16px; box-sizing: border-box; outline: none; }
        button { width: 100%; background: #00a884; color: #0b141a; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { background: #008064; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>💰 Money Vault App</h2>
    <p>Securely deposit and store your real money</p>
    
    <input type="email" id="email" placeholder="Your Email Address">
    <input type="number" id="amount" placeholder="Amount to deposit (₦)">
    <button onclick="payWithPaystack()">Deposit Cash</button>
</div>

<script src="https://paystack.co"></script>
<script>
    function payWithPaystack() {
        const email = document.getElementById('email').value;
        const amount = document.getElementById('amount').value;

        if(!email || !amount) { return alert('Please fill in all fields'); }

        let handler = PaystackPop.setup({
            key: 'pk_test_YOUR_PAYSTACK_PUBLIC_KEY', // Swap this with your real public key later
            email: email,
            amount: amount * 100, // Converts Naira to Kobo
            currency: 'NGN',
            callback: function(response) {
                alert('Deposit processed successfully! Ref: ' + response.reference);
            }
        });
        handler.openIframe();
    }
</script>
</body>
  </html>
